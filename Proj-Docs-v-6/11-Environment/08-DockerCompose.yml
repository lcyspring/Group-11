version: '3.8'

# ============================================
# MITEDTSM (密讯ETM系统) Docker Compose 配置
# 版本: v1.0
# 日期: 2026-03-14
# 用法: docker compose up -d
# ============================================

services:
  # ============================================
  # MySQL 8.0 数据库
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: mitedtsm-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mitedtsm_database}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=512M
    networks:
      - mitedtsm-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis 7 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: mitedtsm-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ./redis/data:/data
    networks:
      - mitedtsm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # RabbitMQ 3 消息队列
  # ============================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mitedtsm-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbit}
      TZ: Asia/Shanghai
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
    networks:
      - mitedtsm-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # MinIO 对象存储
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: mitedtsm-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-Minio@2026}
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - mitedtsm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: mitedtsm-nginx
    restart: always
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${SSL_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
      - ./web/dist:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - mitedtsm-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # MITEDTSM 后端应用
  # ============================================
  app:
    build:
      context: ../../Code/Server
      dockerfile: Dockerfile
    image: mitedtsm-app:${APP_VERSION:-latest}
    container_name: mitedtsm-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      TZ: Asia/Shanghai
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-mitedtsm_database}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-rabbit}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-Minio@2026}
      LOGGING_LEVEL_COM_MEESSION_ETM: DEBUG
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    volumes:
      - ./app/logs:/app/logs
      - ./app/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - mitedtsm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # InitService 数据库初始化 (一次性运行)
  # ============================================
  init-service:
    build:
      context: ../../Code/InitService
      dockerfile: Dockerfile
    image: mitedtsm-init-service:latest
    container_name: mitedtsm-init-service
    restart: "no"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-mitedtsm_database}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mitedtsm-network

# ============================================
# 网络
# ============================================
networks:
  mitedtsm-network:
    driver: bridge
    name: mitedtsm-network
