schema_version: 1

operation:
  startup_mode: check
  shutdown_mode: check
  archive_mode: check
  remove_volumes_on_down: false
  confirm_persistent_data_reset: false

deployment:
  pod_name: mitedtsm-rootless
  stop_timeout_seconds: 120

bpm:
  provision_after_start: false
  provision_manifest: bpm-provision-all.example.yaml

network:
  host_address: 0.0.0.0
  server_host_port: 8080
  server_container_port: 8080
  web_host_port: 8081
  web_container_port: 8081
  mall_host_port: 8082
  mall_container_port: 8082
  use_host_proxy: false
  host_proxy_name: host.containers.internal
  http_proxy: none
  https_proxy: none
  all_proxy: none
  no_proxy: 127.0.0.1,localhost,host.containers.internal

image:
  source: auto
  archive_dir: ../images
  redis_base: docker.io/library/redis:6.2.22-alpine@sha256:60bbb39b25ee8311cfcefd599888ee5de5f2ffe0914b3351064fd2fa9af6c5a3
  rabbitmq_base: docker.io/library/rabbitmq:3.13.7-management-alpine@sha256:3c498e636fd64462480c5f9ff842eb224ab84160a8ada1ded5375e9569e9230c
  tdengine_base: docker.io/tdengine/tdengine:3.3.6.0@sha256:8a4ab7a4843066939d94d5b2d73f7f56292fe463aee76359aaad3adb44090203
  mysql_base: docker.io/library/mysql:8.0.46@sha256:62fb722c78b24245ddff1796a0fcee4a49cc5b87e0aaaf20c92d1da9e0a2497b
  init_runtime: localhost/mitedtsm-rootless-init-service:latest
  server_runtime: localhost/mitedtsm-rootless-server:latest
  web_runtime: localhost/mitedtsm-rootless-web:latest
  mall_runtime: localhost/mitedtsm-rootless-mall:latest

archive:
  redis_base: redis-6-alpine.tar
  rabbitmq_base: rabbitmq-3-management-alpine.tar
  tdengine_base: tdengine-3.3.6.0.tar
  mysql_base: mysql-8.0.tar
  init_runtime: mitedtsm-rootless-init-service.tar
  server_runtime: mitedtsm-rootless-server.tar
  web_runtime: mitedtsm-rootless-web.tar
  mall_runtime: mitedtsm-rootless-mall.tar

container:
  mysql: mitedtsm-rootless-mysql
  redis: mitedtsm-rootless-redis
  rabbitmq: mitedtsm-rootless-rabbitmq
  tdengine: mitedtsm-rootless-tdengine
  init: mitedtsm-rootless-init
  server: mitedtsm-rootless-server
  web: mitedtsm-rootless-web
  mall: mitedtsm-rootless-mall

volume:
  mysql: mitedtsm-rootless-mysql-data
  redis: mitedtsm-rootless-redis-data
  rabbitmq: mitedtsm-rootless-rabbitmq-data
  tdengine: mitedtsm-rootless-tdengine-data

mysql:
  database: mitedtsm_database
  dataset: legacy-demo-v1
  dataset_manifest: ../../database/datasets/legacy-demo-v1.manifest
  existing_dataset_policy: preserve
  cleanup_existing_before_dataset: false
  confirm_persistent_data_change: false
  bootstrap_policy: initialize-empty
  bootstrap_manifest: ../../database/manifests/mysql-bootstrap.manifest
  root_password: 1234
  character_set: utf8mb4
  collation: utf8mb4_unicode_ci
  authentication_plugin: mysql_native_password
  timezone: Asia/Shanghai
  compatibility_migration_manifest: ../../database/manifests/mysql-compatibility.manifest

rabbitmq:
  username: rabbit
  password: rabbit

tdengine:
  host: 127.0.0.1
  port: 6041
  fqdn: localhost
  username: root
  password: taosdata
  initialization_attempts: 30

server:
  spring_profile: local

security:
  mock_login_enabled: false
  mock_secret: not-enabled
  password_encoder_length: 10
  xss_enabled: true
  cors_allowed_origins: "*"
  cors_allowed_headers: Authorization,Content-Type,tenant-id,Accept-Language
  cors_allowed_methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  cors_allow_credentials: false
  cors_max_age_seconds: 3600
  api_docs_enabled: false
  druid_console_enabled: false
  actuator_exposure: health,info
  api_encryption_enabled: false
  captcha_enabled: false
  boot_admin_client_enabled: false

integration:
  justauth_enabled: false
  wx_mp_app_id: not-configured
  wx_mp_secret: not-configured
  wx_miniapp_app_id: not-configured
  wx_miniapp_secret: not-configured
  tencent_lbs_key: not-configured
  pay_order_notify_url: http://127.0.0.1:8080/admin-api/pay/notify/order
  pay_refund_notify_url: http://127.0.0.1:8080/admin-api/pay/notify/refund
  pay_transfer_notify_url: http://127.0.0.1:8080/admin-api/pay/notify/transfer
  express_client: not_provide
  express_kdniao_api_key: not-configured
  express_kdniao_business_id: not-configured
  express_kdniao_request_type: 1002
  express_kd100_key: not-configured
  express_kd100_customer: not-configured

file:
  storage_mode: database
  client_id: 4
  public_base_url: http://127.0.0.1:8080

crm_customer_import:
  max_rows: 2000
  preview_ttl_minutes: 60

crm_export_task:
  enabled: true
  batch_size: 10
  max_batch_size: 100
  max_pending_per_user: 3
  max_rows: 5000
  retention_hours: 24
  token_ttl_seconds: 300
  cron: "0/5 * * * * ?"
  zone: Asia/Shanghai
  lock_key: crm:export-task:scheduler
  lock_lease_seconds: 300

crm_marketing:
  provider_mode: record-only
  tracking_enabled: true
  public_base_url: http://127.0.0.1:8080
  delivery_sync_batch_size: 200
  click_tracking_enabled: true
  click_allowed_hosts: example.com,localhost,127.0.0.1
  max_links_per_broadcast: 10

marketing_provider:
  # disabled 不修改数据库；create-only 仅补缺失项；managed 以本 YAML 更新稳定键对应项
  provision_mode: disabled
  sms_enabled: false
  sms_channel_code: ALIYUN
  sms_signature: not-configured
  sms_api_key: not-configured
  sms_api_secret: not-configured
  sms_callback_url: none
  sms_template_code: crm-marketing-sms
  sms_template_name: CRM 营销短信
  sms_template_content: "{content}"
  sms_template_params: '["content"]'
  sms_api_template_id: not-configured
  mail_enabled: false
  mail_address: noreply@example.com
  mail_username: not-configured
  mail_password: not-configured
  mail_host: smtp.example.com
  mail_port: 465
  mail_ssl_enabled: true
  mail_starttls_enabled: false
  mail_template_code: crm-marketing-mail
  mail_template_name: CRM 营销邮件
  mail_template_nickname: CRM
  mail_template_title: CRM 营销消息
  mail_template_content: "<p>{content}</p>"
  mail_template_params: '["content"]'

health:
  http_host: 127.0.0.1
  interval_seconds: 2
  mysql_attempts: 90
  mysql_host: 127.0.0.1
  mysql_user: root
  mysql_schema_attempts: 180
  mysql_schema_query: SELECT 1 FROM system_users LIMIT 1
  redis_attempts: 60
  rabbitmq_attempts: 90
  rabbitmq_os_user: rabbitmq
  tdengine_attempts: 120
  tdengine_query: SHOW DATABASES;
  server_attempts: 180
  server_path: /actuator/health
  web_attempts: 30
  web_path: /
  mall_attempts: 30
  mall_path: /
