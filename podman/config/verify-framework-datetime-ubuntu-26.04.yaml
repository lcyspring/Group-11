schema_version: 1

image:
  base: docker.io/library/ubuntu:26.04
  name: ghcr.io/elel-code/group-11-build-ubuntu:26.04
  rebuild: false

toolchain:
  pnpm_version: 11.3.0

build:
  engine: standard
  server: false
  init_service: false
  web: false
  clean: false
  crm_tests: false
  crm_coverage: false
  infra_tests: false
  infra_coverage: false
  bpm_tests: false
  bpm_coverage: false
  common_tests: true
  common_coverage: true
  common_test_pattern: TimestampLocalDateTimeDeserializerTest
  ci: true
  maven_threads: 4
  pnpm_frozen_lockfile: true

network:
  use_host_proxy: false

web:
  baidu_analytics_code: disabled
  legacy_media_origins: http://test.yudao.iocoder.cn

cache:
  maven_volume: mitedtsm-build-maven-cache
  pnpm_store_volume: mitedtsm-build-pnpm-store
  pnpm_store_path: /pnpm-store
  web_node_modules_volume: mitedtsm-build-web-node-modules

runtime:
  memory: 4g
  cpus: 4
