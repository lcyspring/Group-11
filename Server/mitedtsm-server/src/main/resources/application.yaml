        options:
          model: deepseek-chat
    model:
      chat: false
      embedding: false
      image: false
      moderation: false
      rerank: false # 是否开启“通义千问”的 Rerank 模型，填写 dashscope 开启
      video: false
      audio:
        speech: false
        transcription: false
    mcp:
      server:
        enabled: false
        name: mitedtsm-mcp-server
