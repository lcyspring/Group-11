      agent:
        enabled: false
    minimax: # Minimax：https://www.minimaxi.com/
      api-key: ${SPRING_AI_MINIMAX_API_KEY:}
    moonshot: # 月之暗面（KIMI）
      api-key: ${SPRING_AI_MOONSHOT_API_KEY:}
    deepseek: # DeepSeek
