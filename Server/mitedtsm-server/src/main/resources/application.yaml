--- #################### 密讯相关配置 ####################

mitedtsm:
  bpm:
    oa:
      leave:
        # 4 年假、5 调休；只有这些类型需要余额预占与审批结算。
        balance-required-types: [4, 5]
        # 新用户首次查询或申请时初始化的年度余额；生产环境应按公司制度显式覆盖。
        default-annual-days:
          4: 5
          5: 0
      loan:
        # 额度和岗位编码均显式配置；岗位未匹配时按 employee-limit。
        employee-limit: 5000
        manager-limit: 20000
        director-limit: 50000
        manager-post-codes: [manager]
        director-post-codes: [director]
  infra:
    file-security:
      protected-path-prefixes: [crm-protected/]
  crm:
    work-order-dispatch:
      enabled: true
      auto-assign-on-create: true
      fallback-mode: UNASSIGNED_POOL
      max-cc-users: 20
      description-min-length: 20
      solution-min-length: 20
    work-order-governance:
      geofence:
        enabled: true
        require-before-complete: false
        default-radius-meters: 300
        max-accuracy-meters: 100
      sla:
        enabled: true
        skip-weekends: true
        zone: Asia/Shanghai
        workday-start: "09:00:00"
        workday-end: "18:00:00"
        default-policy-code: MEDIUM
        cron: "0 */5 * * * ?"
        lock-key: crm:work-order:sla
        lock-lease-seconds: 300
    erp-fulfillment:
      enabled: true
      version: 2026-07-16
      source-system: CRM
      source-type: CONTRACT
      erp-currency: CNY
      allowed-source-currencies: [CNY, USD, EUR]
      currency-mode: CONVERT_TO_ERP_CURRENCY
      amount-scale: 6
      rounding-mode: HALF_UP
      total-tolerance: 0.010000
      max-error-message-length: 1000
    quote:
      version: 2026-07-15
      base-currency: CNY
      default-currency: CNY
      exchange-rates-to-base:
        CNY: 1.000000
        USD: 7.200000
        EUR: 7.800000
      allowed-tax-rates: [0, 1, 3, 6, 9, 13]
      default-tax-rate: 13
      amount-scale: 6
      rounding-mode: HALF_UP
      max-versions-per-business: 50
    activity:
      version: 2026-07-15
      protected-call-recording-directory: crm-protected/call
      max-call-duration-seconds: 86400
      task-overdue:
        enabled: true
        cron: "0 0 * * * ?"
        zone: Asia/Shanghai
        lock-key: crm:activity:task-overdue
        lock-lease-seconds: 1800
        batch-size: 500
        max-batch-size: 5000
        max-batches: 20
      receivable-overdue:
        enabled: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_ENABLED:true}
        cron: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_CRON:0 15 9 * * ?}
        zone: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_ZONE:Asia/Shanghai}
        lock-key: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_LOCK_KEY:crm:receivable:overdue}
        lock-lease-seconds: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_LOCK_LEASE_SECONDS:1800}
        batch-size: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_BATCH_SIZE:200}
        max-batch-size: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_MAX_BATCH_SIZE:2000}
        max-batches: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_MAX_BATCHES:20}
        max-retries: ${MITEDTSM_CRM_RECEIVABLE_OVERDUE_MAX_RETRIES:5}
    marketing:
      provider-mode: ${MITEDTSM_CRM_MARKETING_PROVIDER_MODE:record-only}
      care-enabled: true
      batch-size: 50
      max-batch-size: 500
      per-recipient-daily-limit: 1
      monthly-recipient-limit: 10000
      care-cron: "0 0 9 * * ?"
      care-zone: Asia/Shanghai
      lock-key: crm:marketing:care
      broadcast-enabled: true
      broadcast-cron: "0 * * * * ?"
      broadcast-zone: Asia/Shanghai
      broadcast-lock-key: crm:marketing:broadcast
      lock-lease-seconds: 300
      tracking-enabled: ${MITEDTSM_CRM_MARKETING_TRACKING_ENABLED:true}
      public-base-url: ${MITEDTSM_CRM_MARKETING_PUBLIC_BASE_URL:http://127.0.0.1:8080}
      delivery-sync-batch-size: ${MITEDTSM_CRM_MARKETING_DELIVERY_SYNC_BATCH_SIZE:200}
    customer-import:
      max-rows: ${MITEDTSM_CRM_CUSTOMER_IMPORT_MAX_ROWS:2000}
      preview-ttl-minutes: ${MITEDTSM_CRM_CUSTOMER_IMPORT_PREVIEW_TTL_MINUTES:60}
    authorization:
      # 平台超级管理员和专用 CRM 管理员均可执行 CRM 管理命令；普通角色仍受功能权限和数据范围约束。
      admin-role-codes: [super_admin, crm_admin]
    pool-policy:
      version: 2026-07-15
      customer:
        enabled: true
        contact-expire-days: 30
        deal-expire-days: 30
        high-value-level-threshold: 4
        high-value-expire-multiplier: 2
        protect-active-business: true
        protect-active-contract: true
        protected-contract-audit-statuses: [0, 10, 20]
        daily-claim-limit: 10
        repeat-claim-cooldown-days: 30
        notify-enabled: true
        notify-days: 2
        auto-pool-batch-size: 500
        auto-pool-max-batch-size: 5000
        auto-pool-max-batches: 20
      garbage:
        auto-enabled: true
        expire-days: 180
        minimum-pool-cycles: 3
        batch-size: 500
        max-batch-size: 5000
        max-batches: 20
      clue:
        enabled: true
        contact-expire-days: 30
        max-owned-clues: 100
        daily-claim-limit: 10
        repeat-claim-cooldown-days: 30
        claim-batch-limit: 100
        auto-pool-batch-size: 500
        auto-pool-max-batch-size: 5000
        auto-pool-max-batches: 20
      scheduler:
        enabled: true
        cron: "0 0 2 * * ?"
        zone: Asia/Shanghai
        lock-key: crm:pool-policy:scheduler
        lock-lease-seconds: 1800
    security:
      protected-file-directory: crm-protected/contract
    contract-amendment:
      process-definition-key: crm-contract-amendment-audit
      number-prefix: BC
    receivable-refund:
      process-definition-key: crm-receivable-refund-audit
      number-prefix: TK
    reimbursement:
      process-definition-key: crm-reimbursement-audit
      number-prefix: BX
      default-currency: CNY
      protected-file-directory: crm-protected/reimbursement
    statistics-metadata:
      # CRM 统计当前均为请求时实时聚合；指标口径只能在此处显式声明。
      refresh-mode: REALTIME_QUERY
      permission-mode: CRM_TENANT_AND_DATA_SCOPE
      history-recalculation: QUERY_CURRENT_LEDGER_STATE_ONLY
      reconciliation: DRILLDOWN_OR_SOURCE_LEDGER_EXPORT
      metrics:
        - scope: customer
          code: customer.new-count
          name: 新增客户数
          source-tables: [crm_customer]
          source-fields: [id, owner_user_id, create_time, deleted]
          business-time: crm_customer.create_time
          formula: COUNT(crm_customer.id)
          filters: [deleted = 0, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.deal-count
          name: 成交客户数
          source-tables: [crm_customer, crm_contract]
          source-fields: [crm_customer.id, crm_customer.owner_user_id, crm_customer.create_time, crm_contract.customer_id, crm_contract.audit_status]
          business-time: crm_customer.create_time
          formula: COUNT(DISTINCT crm_customer.id) with approved contract
          filters: [customer and contract deleted = 0, contract audit_status = approved, owner_user_id in authorized users]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.deal-cycle
          name: 客户首次成交周期
          source-tables: [crm_customer, crm_contract]
          source-fields: [crm_customer.id, crm_customer.create_time, crm_contract.customer_id, crm_contract.order_date, crm_contract.audit_status]
          business-time: crm_contract.order_date
          formula: AVG(DATEDIFF(first approved contract order_date, customer create_time)); negative values remain in the average and are exposed through negativeSampleCount
          filters: [customer and contract deleted = 0, first contract audit_status = approved, owner_user_id in authorized users]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.follow-up-count
          name: 客户跟进次数
          source-tables: [crm_follow_up_record]
          source-fields: [id, biz_type, biz_id, creator, create_time, deleted]
          business-time: crm_follow_up_record.create_time
          formula: COUNT(crm_follow_up_record.id)
          filters: [deleted = 0, biz_type = CRM_CUSTOMER, creator in authorized users, create_time in selected range]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.follow-up-customer-count
          name: 跟进客户数
          source-tables: [crm_follow_up_record]
          source-fields: [biz_id, biz_type, creator, create_time, deleted]
          business-time: crm_follow_up_record.create_time
          formula: COUNT(DISTINCT biz_id) inside each display interval
          filters: [deleted = 0, biz_type = CRM_CUSTOMER, creator in authorized users, create_time in selected range]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.contract-amount
          name: 客户合同金额
          source-tables: [crm_contract]
          source-fields: [total_price, owner_user_id, order_date, audit_status, deleted]
          business-time: crm_contract.order_date
          formula: SUM(crm_contract.total_price)
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, order_date in selected range]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.receivable-amount
          name: 客户回款金额
          source-tables: [crm_receivable]
          source-fields: [price, owner_user_id, return_time, audit_status, deleted]
          business-time: crm_receivable.return_time
          formula: SUM(crm_receivable.price)
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, return_time in selected range]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: customer
          code: customer.deal-top10
          name: 客户成交金额 TOP10
          source-tables: [crm_customer, crm_contract]
          source-fields: [crm_customer.id, crm_customer.name, crm_contract.total_price, crm_contract.order_date, crm_contract.audit_status]
          business-time: crm_contract.order_date
          formula: SUM(approved contract total_price) GROUP BY customer ORDER BY amount DESC, customer id ASC LIMIT 10
          filters: [customer and contract deleted = 0, contract audit_status = approved, customer owner in authorized users]
          permission: crm:statistics-customer:query + CRM authorized user scope + tenant isolation
        - scope: funnel
          code: funnel.business.new-count
          name: 新增商机数
          source-tables: [crm_business]
          source-fields: [id, owner_user_id, create_time, deleted]
          business-time: crm_business.create_time
          formula: COUNT(crm_business.id)
          filters: [deleted = 0, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-funnel:query + CRM authorized user scope + tenant isolation
        - scope: funnel
          code: funnel.stage-count
          name: 阶段商机数
          source-tables: [crm_business, crm_business_status]
          source-fields: [crm_business.id, crm_business.status_id, crm_business.end_status, crm_business.total_price, crm_business_status.sort]
          business-time: crm_business.create_time
          formula: COUNT businesses that reached each configured stage
          filters: [business deleted = 0, active or won business, status type matches query, owner in authorized users]
          permission: crm:statistics-funnel:query + CRM authorized user scope + tenant isolation
        - scope: funnel
          code: funnel.stage-amount
          name: 阶段商机金额
          source-tables: [crm_business, crm_business_status]
          source-fields: [crm_business.total_price, crm_business.status_id, crm_business.end_status, crm_business_status.sort]
          business-time: crm_business.create_time
          formula: SUM(total_price) for businesses that reached each configured stage
          filters: [business deleted = 0, active or won business, status type matches query, owner in authorized users]
          permission: crm:statistics-funnel:query + CRM authorized user scope + tenant isolation
        - scope: funnel
          code: funnel.win-conversion-rate
          name: 赢单转化率
          source-tables: [crm_business]
          source-fields: [id, end_status, owner_user_id, create_time, deleted]
          business-time: crm_business.create_time
          formula: won business count / total business count * 100
          filters: [deleted = 0, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-funnel:query + CRM authorized user scope + tenant isolation
        - scope: funnel
          code: funnel.forecast-expected-amount
          name: 销售预测金额
          source-tables: [crm_business]
          source-fields: [total_price, deal_time, end_status, owner_user_id, deleted]
          business-time: crm_business.deal_time
          formula: SUM(total_price)
          filters: [deleted = 0, end_status = active, owner_user_id in authorized users, deal_time in selected range]
          permission: crm:statistics-funnel:query + CRM authorized user scope + tenant isolation
        - scope: funnel
          code: funnel.forecast-weighted-amount
          name: 概率金额
          source-tables: [crm_business, crm_business_status]
          source-fields: [crm_business.total_price, crm_business.deal_time, crm_business.status_id, crm_business_status.percent]
          business-time: crm_business.deal_time
          formula: SUM(total_price * status percent / 100)
          filters: [business deleted = 0, end_status = active, owner_user_id in authorized users, deal_time in selected range]
          permission: crm:statistics-funnel:query + CRM authorized user scope + tenant isolation
        - scope: performance
          code: performance.contract-count
          name: 签约合同数
          source-tables: [crm_contract]
          source-fields: [id, owner_user_id, order_date, audit_status, deleted]
          business-time: crm_contract.order_date
          formula: COUNT(crm_contract.id) GROUP BY calendar month
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, order_date in selected year]
          permission: crm:statistics-performance:query + CRM authorized user scope + tenant isolation
        - scope: performance
          code: performance.contract-amount
          name: 签约合同金额
          source-tables: [crm_contract]
          source-fields: [total_price, owner_user_id, order_date, audit_status, deleted]
          business-time: crm_contract.order_date
          formula: SUM(total_price) GROUP BY calendar month
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, order_date in selected year]
          permission: crm:statistics-performance:query + CRM authorized user scope + tenant isolation
        - scope: performance
          code: performance.receivable-amount
          name: 回款金额
          source-tables: [crm_receivable]
          source-fields: [price, owner_user_id, return_time, audit_status, deleted]
          business-time: crm_receivable.return_time
          formula: SUM(price) GROUP BY calendar month
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, return_time in selected year]
          permission: crm:statistics-performance:query + CRM authorized user scope + tenant isolation
        - scope: performance
          code: performance.target-completion
          name: 目标完成率
          source-tables: [crm_performance_target, crm_contract, crm_receivable, crm_follow_up_record, crm_customer, crm_business]
          source-fields: [target_type, target_month, target_value, actual metric value]
          business-time: target calendar month and each actual metric business time
          formula: actual value / configured target value * 100
          filters: [target scope matches company department or user, actual metric uses approved ledger rules where applicable]
          permission: crm:statistics-performance:query + CRM authorized user scope + tenant isolation
        - scope: portrait
          code: portrait.customer-region
          name: 客户区域分布
          source-tables: [crm_customer, system_area]
          source-fields: [crm_customer.area_id, crm_customer.owner_user_id, crm_customer.create_time, system_area.parent_id]
          business-time: crm_customer.create_time
          formula: COUNT(customer id) GROUP BY normalized city province or country area
          filters: [customer deleted = 0, area_id is not null, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-portrait:query + CRM authorized user scope + tenant isolation
        - scope: portrait
          code: portrait.customer-industry
          name: 客户行业分布
          source-tables: [crm_customer]
          source-fields: [id, industry_id, deal_status, owner_user_id, create_time]
          business-time: crm_customer.create_time
          formula: COUNT(id) and SUM(deal_status) GROUP BY industry_id
          filters: [deleted = 0, industry_id is not null, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-portrait:query + CRM authorized user scope + tenant isolation
        - scope: portrait
          code: portrait.customer-level
          name: 客户级别分布
          source-tables: [crm_customer]
          source-fields: [id, level, deal_status, owner_user_id, create_time]
          business-time: crm_customer.create_time
          formula: COUNT(id) and SUM(deal_status) GROUP BY level
          filters: [deleted = 0, level is not null, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-portrait:query + CRM authorized user scope + tenant isolation
        - scope: portrait
          code: portrait.customer-source
          name: 客户来源分布
          source-tables: [crm_customer]
          source-fields: [id, source, deal_status, owner_user_id, create_time]
          business-time: crm_customer.create_time
          formula: COUNT(id) and SUM(deal_status) GROUP BY source
          filters: [deleted = 0, source is not null, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-portrait:query + CRM authorized user scope + tenant isolation
        - scope: portrait
          code: portrait.customer-lifecycle
          name: 客户生命周期分布
          source-tables: [crm_customer]
          source-fields: [id, lifecycle_status, owner_user_id, create_time]
          business-time: crm_customer.create_time
          formula: COUNT(id) GROUP BY lifecycle_status
          filters: [deleted = 0, lifecycle_status is not null, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-portrait:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.contract-amount
          name: 合同金额排行
          source-tables: [crm_contract]
          source-fields: [total_price, owner_user_id, order_date, audit_status, deleted]
          business-time: crm_contract.order_date
          formula: SUM(total_price) GROUP BY owner_user_id
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, order_date in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.receivable-amount
          name: 回款金额排行
          source-tables: [crm_receivable]
          source-fields: [price, owner_user_id, return_time, audit_status, deleted]
          business-time: crm_receivable.return_time
          formula: SUM(price) GROUP BY owner_user_id
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, return_time in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.contract-count
          name: 签约合同排行
          source-tables: [crm_contract]
          source-fields: [id, owner_user_id, order_date, audit_status, deleted]
          business-time: crm_contract.order_date
          formula: COUNT(id) GROUP BY owner_user_id
          filters: [deleted = 0, audit_status = approved, owner_user_id in authorized users, order_date in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.product-sales
          name: 产品销量排行
          source-tables: [crm_contract, crm_contract_product]
          source-fields: [crm_contract.owner_user_id, crm_contract.order_date, crm_contract.audit_status, crm_contract_product.count]
          business-time: crm_contract.order_date
          formula: SUM(crm_contract_product.count) GROUP BY contract owner_user_id
          filters: [contract and product deleted = 0, contract audit_status = approved, owner_user_id in authorized users]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.customer-count
          name: 新增客户数排行
          source-tables: [crm_customer]
          source-fields: [id, owner_user_id, create_time, deleted]
          business-time: crm_customer.create_time
          formula: COUNT(id) GROUP BY owner_user_id
          filters: [deleted = 0, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.contact-count
          name: 新增联系人数排行
          source-tables: [crm_contact]
          source-fields: [id, owner_user_id, create_time, deleted]
          business-time: crm_contact.create_time
          formula: COUNT(id) GROUP BY owner_user_id
          filters: [deleted = 0, owner_user_id in authorized users, create_time in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.follow-up-count
          name: 跟进次数排行
          source-tables: [crm_follow_up_record]
          source-fields: [id, biz_type, creator, create_time, deleted]
          business-time: crm_follow_up_record.create_time
          formula: COUNT(id) GROUP BY creator
          filters: [deleted = 0, biz_type = CRM_CUSTOMER, creator in authorized users, create_time in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: rank
          code: rank.follow-up-customer-count
          name: 跟进客户数排行
          source-tables: [crm_follow_up_record]
          source-fields: [biz_id, biz_type, creator, create_time, deleted]
          business-time: crm_follow_up_record.create_time
          formula: COUNT(DISTINCT biz_id) GROUP BY creator
          filters: [deleted = 0, biz_type = CRM_CUSTOMER, creator in authorized users, create_time in selected range]
          permission: crm:statistics-rank:query + CRM authorized user scope + tenant isolation
        - scope: workorder
          code: workorder.total-count
          name: 工单总数
          source-tables: [crm_work_order]
          source-fields: [id, creator, handler_user_id, create_time, tenant_id, deleted]
          business-time: crm_work_order.create_time
          formula: COUNT(crm_work_order.id)
          filters: [tenant_id = current tenant, deleted = 0, creator or handler when query-all permission is absent, create_time in selected range]
          permission: crm:statistics-work-order:query + tenant isolation + creator/handler scope unless query-all granted
        - scope: workorder
          code: workorder.completion-rate
          name: 工单完结率
          source-tables: [crm_work_order]
          source-fields: [id, status, creator, handler_user_id, create_time, tenant_id, deleted]
          business-time: crm_work_order.create_time
          formula: completed count / total count * 100
          filters: [tenant_id = current tenant, deleted = 0, creator or handler when query-all permission is absent, create_time in selected range]
          permission: crm:statistics-work-order:query + tenant isolation + creator/handler scope unless query-all granted
        - scope: workorder
          code: workorder.created-trend
          name: 工单创建趋势
          source-tables: [crm_work_order]
          source-fields: [id, create_time, creator, handler_user_id, tenant_id, deleted]
          business-time: crm_work_order.create_time
          formula: COUNT(id) GROUP BY calendar day
          filters: [tenant_id = current tenant, deleted = 0, creator or handler when query-all permission is absent, create_time in selected range]
          permission: crm:statistics-work-order:query + tenant isolation + creator/handler scope unless query-all granted
        - scope: workorder
          code: workorder.completed-trend
          name: 工单完结趋势
          source-tables: [crm_work_order]
          source-fields: [id, complete_time, creator, handler_user_id, tenant_id, deleted]
          business-time: crm_work_order.complete_time
          formula: COUNT(id) GROUP BY calendar day
          filters: [tenant_id = current tenant, deleted = 0, complete_time is not null, creator or handler when query-all permission is absent]
          permission: crm:statistics-work-order:query + tenant isolation + creator/handler scope unless query-all granted
  info:
    version: 1.0.0
    base-package: com.meession.etm
  web:
    admin-ui:
      url: http://dashboard.mitedtsm.iocoder.cn # Admin 管理后台 UI 的地址
    cors:
      allowed-origin-patterns: [] # 运行环境必须通过显式配置声明可信前端来源
      allowed-headers: [Authorization, Content-Type, tenant-id, Accept-Language]
      allowed-methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
      allow-credentials: true
      max-age: 1h
  xss:
    enable: true
    exclude-urls: # 如下两个 url，仅仅是为了演示，去掉配置也没关系
      - ${spring.boot.admin.context-path}/** # 不处理 Spring Boot Admin 的请求
      - ${management.endpoints.web.base-path}/** # 不处理 Actuator 的请求
  security:
    mock-enable: false
    password-encoder-length: 10
    permit-all_urls:
      - /admin-api/mp/open/** # 微信公众号开放平台，微信回调接口，不需要登录
  api-encrypt:
    enable: false # 获得显式密钥和前端协议后再启用，禁止使用仓库示例密钥
    algorithm: AES # 加密算法，支持 AES、RSA 等
    request-key: ${MITEDTSM_API_ENCRYPT_REQUEST_KEY:}
    response-key: ${MITEDTSM_API_ENCRYPT_RESPONSE_KEY:}
#    request-key: ${MITEDTSM_API_ENCRYPT_RSA_PRIVATE_KEY:} # RSA 模式由运行配置显式提供
#    response-key: ${MITEDTSM_API_ENCRYPT_RSA_PUBLIC_KEY:} # RSA 模式由运行配置显式提供
  websocket:
    enable: true # websocket的开关
    path: /infra/ws # 路径
    sender-type: local # 消息发送的类型，可选值为 local、redis、rocketmq、kafka、rabbitmq
    sender-rocketmq:
      topic: ${spring.application.name}-websocket # 消息发送的 RocketMQ Topic
      consumer-group: ${spring.application.name}-websocket-consumer # 消息发送的 RocketMQ Consumer Group
    sender-rabbitmq:
      exchange: ${spring.application.name}-websocket-exchange # 消息发送的 RabbitMQ Exchange
      queue: ${spring.application.name}-websocket-queue # 消息发送的 RabbitMQ Queue
    sender-kafka:
      topic: ${spring.application.name}-websocket # 消息发送的 Kafka Topic
      consumer-group: ${spring.application.name}-websocket-consumer # 消息发送的 Kafka Consumer Group
  swagger:
    title: Mitedtsm 管理平台
    description: 提供管理后台、用户 App 的所有功能
    version: ${mitedtsm.info.version}
    url: ${mitedtsm.web.admin-ui.url}
    email: xingyu4j@vip.qq.com
    license: MIT
    license-url: https://gitee.com/zhijiantianya/ruoyi-vue-pro/blob/master/LICENSE
  codegen:
    base-package: ${mitedtsm.info.base-package}
    db-schemas: ${spring.datasource.dynamic.datasource.master.name}
    front-type: 20 # 前端模版的类型，参见 CodegenFrontTypeEnum 枚举类
    vo-type: 10 # VO 的类型，参见 CodegenVOTypeEnum 枚举类
    delete-batch-enable: true # 是否生成批量删除接口
    unit-test-enable: false # 是否生成单元测试
  tenant: # 多租户相关配置项
    enable: true
    ignore-urls:
      - /jmreport/* # 积木报表，无法携带租户编号
    ignore-visit-urls:
      - /admin-api/system/user/profile/**
      - /admin-api/system/auth/**
    ignore-tables:
    ignore-caches:
      - user_role_ids
      - permission_menu_ids
      - oauth_client
      - notify_template
      - mail_account
      - mail_template
      - sms_template
      - iot:device
      - iot:thing_model_list
  sms-code: # 短信验证码相关的配置项
    expire-times: 10m
    send-frequency: 1m
    send-maximum-quantity-per-day: 10
    begin-code: 9999 # 这里配置 9999 的原因是，测试方便。
    end-code: 9999 # 这里配置 9999 的原因是，测试方便。
  trade:
    order:
      pay-expire-time: 2h # 支付的过期时间
      receive-expire-time: 14d # 收货的过期时间
      comment-expire-time: 7d # 评论的过期时间
      status-sync-to-wxa-enable: true # 是否同步订单状态到微信小程序
    express:
      client: ${MITEDTSM_EXPRESS_CLIENT:not_provide}
      kd-niao:
        api-key: ${MITEDTSM_EXPRESS_KDNIAO_API_KEY:not-configured}
        business-id: ${MITEDTSM_EXPRESS_KDNIAO_BUSINESS_ID:not-configured}
        request-type: ${MITEDTSM_EXPRESS_KDNIAO_REQUEST_TYPE:1002} # 免费版 1002；付费版 8001
      kd100:
        key: ${MITEDTSM_EXPRESS_KD100_KEY:not-configured}
        customer: ${MITEDTSM_EXPRESS_KD100_CUSTOMER:not-configured}
  iot:
    message-bus:
      type: redis # 消息总线的类型

debug: false
