# pnpm 11 requires an explicit allowlist for dependency lifecycle scripts.
# These packages are locked in pnpm-lock.yaml and are required by the Vite build.
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  es5-ext: true
  esbuild: true
  vue-demi: true
